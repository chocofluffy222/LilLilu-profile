<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>リルリル</title>

  <style>
    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      min-height:100%;
    }

    body{
  min-height:100vh;
  overflow-x:hidden;
  font-family:
    system-ui,
    -apple-system,
    "Hiragino Sans",
    "Noto Sans JP",
    sans-serif;

  background:
    radial-gradient(
      circle at 8% 10%,
      rgba(255,226,160,.95) 0%,
      transparent 32%
    ),

    radial-gradient(
      circle at 88% 12%,
      rgba(255,178,158,.92) 0%,
      transparent 34%
    ),

    radial-gradient(
      circle at 12% 88%,
      rgba(255,214,234,.92) 0%,
      transparent 36%
    ),

    radial-gradient(
      circle at 90% 78%,
      rgba(222,206,255,.92) 0%,
      transparent 34%
    ),

    radial-gradient(
      circle at 50% 100%,
      rgba(205,236,255,.95) 0%,
      transparent 42%
    ),

    linear-gradient(
      180deg,
      #ffe8a8 0%,
      #ffbda9 22%,
      #ffd8ea 48%,
      #e8dcff 72%,
      #d8f1ff 100%
    );
}

      overflow-x:hidden;
    }
   body::before{
  content:"";
  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at 28% 18%, rgba(255,255,255,.30), transparent 40%),
    radial-gradient(circle at 72% 78%, rgba(255,255,255,.24), transparent 44%),
    radial-gradient(circle at 50% 45%, rgba(255,255,255,.16), transparent 55%);

  pointer-events:none;
  z-index:0;
}
    .wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
  padding-top:60px;
  position:relative;
  z-index:1;
}

    .img{
      width:min(92vw,560px);
      height:auto;
      display:block;
      border-radius:18px;

      /* 中央より、ほんの少しだけ下 */
      transform:translateY(30px);

      box-shadow:
        0 12px 30px rgba(180,160,200,.22);
    }

   .back{
  display:inline-flex;
  align-items:center;
  justify-content:center;

  margin-top:60px;
  padding:8px 18px;

  font-size:13px;
  font-weight:600;
  letter-spacing:.04em;

  color:#8a7b86;
  text-decoration:none;

  background:linear-gradient(
    180deg,
    rgba(255,245,248,.95),
    rgba(244,239,255,.95)
  );

  border:1px solid rgba(255,255,255,.8);
  border-radius:999px;

  box-shadow:
    0 3px 8px rgba(180,160,200,.12),
    inset 0 1px 0 rgba(255,255,255,.9);

  transition:.2s;
}

.back:hover{
  transform:translateY(-1px);
  box-shadow:
    0 5px 12px rgba(180,160,200,.18),
    inset 0 1px 0 rgba(255,255,255,.95);
}

.back:active{
  transform:translateY(1px);
}

    /* 飛ぶハート */
    .heart{
      position:fixed;
      width:32px;
      height:32px;
      pointer-events:none;
      opacity:0;

      transform:translate(-50%,-50%);
      animation:heartPop 1.6s ease-out forwards;

      filter:
        drop-shadow(0 0 6px rgba(255,180,200,.95))
        drop-shadow(0 0 18px rgba(255,140,180,.7));

      z-index:3;
    }

    @keyframes heartPop{
      0%{
        opacity:0;
        transform:
          translate(-50%,-50%)
          scale(.45);
      }

      20%{
        opacity:1;
      }

      100%{
        opacity:0;
        transform:
          translate(
            calc(-50% + var(--dx)),
            calc(-50% + var(--dy))
          )
          scale(1.35);
      }
    }
  </style>
</head>

<body>

  <div class="wrap">
    <img
      class="img"
      src="02lillilu.png"
      alt="リルリル"
    />

    <a class="back" href="index.html">
      ◀︎ みんなのところへ♡
    </a>
  </div>

  <script>
    function startAutoHeart(){
      const min = 1600;
      const max = 3000;

      function spawn(){
        const heart = document.createElement("div");
        heart.className = "heart";

        /* 画面中央付近から出す */
        const offsetX = Math.random() * 240 - 120;
        const offsetY = Math.random() * 200 - 100;

        heart.style.left = `calc(50vw + ${offsetX}px)`;
        heart.style.top = `calc(50vh + ${offsetY}px)`;

        /* 飛んでいく方向 */
        heart.style.setProperty(
          "--dx",
          `${Math.random() * 140 - 70}px`
        );

        heart.style.setProperty(
          "--dy",
          `${-(Math.random() * 90 + 120)}px`
        );

        heart.innerHTML = `
          <svg
            viewBox="0 0 24 24"
            width="32"
            height="32"
            aria-hidden="true"
          >
            <path
              fill="rgba(255,170,200,1)"
              d="M12 21s-6.7-4.6-9.5-8.2
                 C.6 10.4 1.1 6.9 4.1 5.4
                 6.1 4.4 8.4 5.2 9.6 7
                 c1.2-1.8 3.5-2.6 5.5-1.6
                 3 1.5 3.5 5 1.6 7.4
                 C18.7 16.4 12 21 12 21z"
            />
          </svg>
        `;

        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 1700);

        const nextTime =
          Math.random() * (max - min) + min;

        setTimeout(spawn, nextTime);
      }

      setTimeout(spawn, 700);
    }

    startAutoHeart();
  </script>

</body>
</html>
