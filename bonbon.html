<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ボンボン</title>
  <style>
  body{
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,.32), transparent 42%),
    radial-gradient(circle at 70% 80%, rgba(255,255,255,.22), transparent 46%);
  pointer-events:none;
  z-index:0;
}
  background:
    radial-gradient(circle at top left,
      rgba(255,220,235,.95) 0%,
      rgba(255,220,235,.55) 35%,
      transparent 62%
    ),
    radial-gradient(circle at bottom right,
      rgba(210,220,255,.95) 0%,
      rgba(210,220,255,.55) 35%,
      transparent 62%
    ),
    linear-gradient(180deg,#ffeaf3 0%,#efe7ff 55%,#e9f2ff 100%);
}
    .wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px 20px;
  position:relative;
  z-index:1;
}
    .img{
  width:min(92vw,560px);
  height:auto;
  display:block;
  transform:translateY(25px);
}
    .back{display:inline-block;margin:12px 0 0;color:#6b5b57;text-decoration:none;font-weight:700;}
  .heart{
  position:fixed;
  width:32px;
  height:32px;
  pointer-events:none;
  opacity:0;
  transform:translate(-50%,-50%);
  animation:heartPop 1.6s ease-out forwards;
  filter:
    drop-shadow(0 0 6px rgba(255,180,200,.95))
    drop-shadow(0 0 18px rgba(255,140,180,.7));
  z-index:3;
}

@keyframes heartPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.45);}
  20%{opacity:1;}
  100%{
    opacity:0;
    transform:
      translate(calc(-50% + var(--dx)),
                calc(-50% + var(--dy)))
      scale(1.35);
  }
}
  </style>
</head>
<body>
  <div class="wrap">
    <img class="img" src="05bonbon.png" alt="ボンボン" />
    <a class="back" href="index.html">← もどる</a>
  </div>
  <script>

}

startAutoHeart();
</script>
</body>
</html>
